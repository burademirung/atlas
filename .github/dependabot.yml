# Dependabot — weekly dependency + action updates for every ecosystem in Atlas.
#
# Notes:
#   * apps/api is managed with `uv`, but its dependencies live in pyproject.toml
#     / uv.lock which Dependabot reads via the `pip` ecosystem (PEP 621 +
#     uv.lock support). No `uv` ecosystem keyword exists.
#   * github-actions at "/" also discovers actions in reusable workflows; keep
#     SHA pins — Dependabot bumps the pin and updates the trailing version
#     comment for you.
version: 2

updates:
  # ---- Python (FastAPI API + LangGraph agent graph) ----
  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    groups:
      python-minor-patch:
        update-types: [minor, patch]
    labels: [dependencies, python]
    commit-message:
      prefix: "deps(api)"

  # ---- Node (Cloudflare Worker + SPA) ----
  - package-ecosystem: npm
    directory: /apps/cloudflare
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
    labels: [dependencies, javascript]
    commit-message:
      prefix: "deps(web)"

  # ---- GitHub Actions (SHA pins across all workflows) ----
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    groups:
      actions:
        update-types: [minor, patch]
    labels: [dependencies, github-actions]
    commit-message:
      prefix: "deps(ci)"

  # ---- Terraform (modules + per-env roots) ----
  - package-ecosystem: terraform
    directories:
      - /infra/terraform/modules/*
      - /infra/terraform/envs/dev
      - /infra/terraform/envs/prod
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    labels: [dependencies, terraform]
    commit-message:
      prefix: "deps(infra)"

  # ---- Docker base images (API / worker) ----
  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels: [dependencies, docker]
    commit-message:
      prefix: "deps(docker)"
