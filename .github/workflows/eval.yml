# Agent-quality eval — runs the research agent over a fixed question set with
# the real Claude model and scores quality (no uncited claims, source coverage,
# citations). Scheduled (not per-PR, to avoid cost/flakiness) + manual dispatch.
# The cheap structural version of this harness runs per-PR via tests/test_evals.py.
name: Agent eval

on:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Live agent-quality eval
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/api
    env:
      # get_settings() requires these; the eval doesn't touch the DB/Redis.
      DATABASE_URL: postgresql+asyncpg://placeholder/db
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-eval-secret-ci-eval-secret-32x
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up uv (with cache)
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          version: "0.7.13"
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Sync (frozen)
        run: uv sync --frozen --all-groups

      - name: Run agent-quality eval
        run: uv run python -m atlas_api.evals
