# Deploy the Atlas Cloudflare Worker (serves the SPA static assets + edge JWT
# verify / rate-limit / SSE proxy) via wrangler.
#
# Auth uses a *scoped* Cloudflare API token (CLOUDFLARE_API_TOKEN) — Workers
# Scripts:Edit + Account/Workers KV/D1 as the binding set requires — not a
# global API key. Cloudflare does not yet support GitHub OIDC for wrangler, so a
# narrowly-scoped, rotated token stored as an environment secret is the
# least-privilege option. Account id is a non-secret repo variable.
name: Deploy Worker (Cloudflare)

on:
  push:
    branches: [main]
    paths:
      - apps/cloudflare/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions: {}

# Serialize Cloudflare deploys; never cancel an in-flight one.
concurrency:
  group: cloudflare-worker-production
  cancel-in-progress: false

jobs:
  deploy:
    name: wrangler deploy
    runs-on: ubuntu-24.04
    environment:
      name: cloudflare-production
      url: ${{ vars.CLOUDFLARE_WORKER_URL }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node 20 (with npm cache)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/cloudflare/package-lock.json

      - name: Install (npm ci)
        run: npm ci

      - name: Type check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          workingDirectory: apps/cloudflare
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
