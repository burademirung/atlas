# Continuous Delivery for Atlas (Deep-Research Studio).
#
# Triggered on a push to main or a `v*` release tag. Builds the container
# images (api + arq worker + web origin), signs them with cosign (keyless,
# OIDC), attaches an SBOM, pushes to Amazon ECR addressed by *digest* (immutable
# tags), then `helm upgrade --install`s the Atlas chart onto EKS.
#
# No long-lived AWS keys: every AWS call authenticates via GitHub OIDC by
# assuming an IAM role (configured per environment). The deploy job runs inside
# the `production` GitHub Environment, which is configured with required
# reviewers, so a human must approve before anything reaches the cluster.
#
# Concurrency is *serialized* (cancel-in-progress: false) so two deploys can
# never race for the same cluster.
name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions: {}

concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }} # e.g. 123456789012.dkr.ecr.eu-west-1.amazonaws.com

jobs:
  # ---------------------------------------------------------------------------
  # Build, sign, SBOM, and push each image addressed by immutable digest.
  # Emits the per-image digest as a job output for the deploy job to consume.
  # ---------------------------------------------------------------------------
  build:
    name: Build & push (${{ matrix.image.name }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read # checkout
      id-token: write # OIDC -> AWS (ECR) and cosign keyless signing
    strategy:
      fail-fast: false
      matrix:
        image:
          # The api and the arq worker share apps/api/Dockerfile; the worker's
          # entrypoint is overridden by the Helm chart (different command, same
          # artifact). `web` builds the static SPA into a hardened origin image
          # used as the in-cluster fallback origin behind the Cloudflare Worker.
          - name: api
            context: apps/api
            dockerfile: apps/api/Dockerfile
            repository: atlas/api
          - name: worker
            context: apps/api
            dockerfile: apps/api/Dockerfile
            repository: atlas/worker
          - name: web
            context: apps/web
            dockerfile: apps/web/Dockerfile
            repository: atlas/web
    outputs:
      api_digest: ${{ steps.collect.outputs.api_digest }}
      worker_digest: ${{ steps.collect.outputs.worker_digest }}
      web_digest: ${{ steps.collect.outputs.web_digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-atlas-build-${{ github.run_id }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.7.0

      - name: Build & push (by digest)
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          # An immutable, content-addressed tag plus a convenience git-sha tag.
          # The deploy uses the digest, never a mutable tag.
          tags: ${{ env.ECR_REGISTRY }}/${{ matrix.image.repository }}:${{ github.sha }}
          provenance: true # SLSA provenance attestation
          sbom: true # in-toto SBOM attestation
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

      - name: Generate SBOM (syft / SPDX)
        uses: anchore/sbom-action@df80a981bc6edbc4e220a492d3cbe9f5547a6e75 # v0.17.9
        with:
          image: ${{ env.ECR_REGISTRY }}/${{ matrix.image.repository }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          artifact-name: sbom-${{ matrix.image.name }}.spdx.json

      - name: Sign image (cosign keyless) & attest SBOM
        env:
          IMAGE_REF: ${{ env.ECR_REGISTRY }}/${{ matrix.image.repository }}@${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "$IMAGE_REF"
          cosign attest --yes --type spdxjson \
            --predicate "sbom-${{ matrix.image.name }}.spdx.json" "$IMAGE_REF"

      - name: Export digest as job output
        id: collect
        env:
          IMAGE_NAME: ${{ matrix.image.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: echo "${IMAGE_NAME}_digest=${IMAGE_DIGEST}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Deploy to EKS via Helm. Gated by the `production` Environment (required
  # reviewers + branch/tag protection). Pins every image by digest.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to EKS (production)
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: production
      url: ${{ vars.APP_URL }}
    permissions:
      contents: read
      id-token: write # OIDC -> AWS (EKS)
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-atlas-deploy-${{ github.run_id }}

      - name: Install Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.16.4

      - name: Update kubeconfig for EKS
        env:
          CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"

      - name: Helm upgrade --install (digest-pinned)
        env:
          API_DIGEST: ${{ needs.build.outputs.api_digest }}
          WORKER_DIGEST: ${{ needs.build.outputs.worker_digest }}
          WEB_DIGEST: ${{ needs.build.outputs.web_digest }}
        run: |
          helm upgrade --install atlas infra/k8s \
            --namespace atlas --create-namespace \
            --values infra/k8s/values.yaml \
            --set-string image.registry="$ECR_REGISTRY" \
            --set-string image.api.repository=atlas/api \
            --set-string image.api.digest="$API_DIGEST" \
            --set-string image.worker.repository=atlas/worker \
            --set-string image.worker.digest="$WORKER_DIGEST" \
            --set-string image.web.repository=atlas/web \
            --set-string image.web.digest="$WEB_DIGEST" \
            --atomic --wait --timeout 10m

      - name: Smoke check (readiness)
        run: kubectl -n atlas rollout status deployment/atlas-api --timeout=5m
