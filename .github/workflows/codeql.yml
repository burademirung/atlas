# CodeQL static analysis for Atlas.
#
# Kept separate from ci.yml because CodeQL is heavier and benefits from its own
# schedule and concurrency. Analyses both languages in the repo via a matrix:
#   * python              -> apps/api (FastAPI + LangGraph agent graph)
#   * javascript-typescript -> apps/cloudflare (Worker + SPA)
#
# Runs on PRs, pushes to main, and a weekly schedule so the default branch is
# continuously re-scanned against updated CodeQL queries.
name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # Mondays 03:27 UTC

permissions: {}

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write # upload CodeQL results
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b6a472f63d85b9c78a3ac5e89422239fc15e9b3c # v3.28.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b6a472f63d85b9c78a3ac5e89422239fc15e9b3c # v3.28.1
        with:
          category: "/language:${{ matrix.language }}"
