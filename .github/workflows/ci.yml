# Continuous Integration for Atlas (Deep-Research Studio).
#
# Runs the fast, untrusted-input safe checks on every pull request and on every
# push to main: Python lint/type/test for the FastAPI service, a TypeScript
# type-check for the Cloudflare Worker/SPA, and a supply-chain scan gate (Trivy
# filesystem + IaC config, plus a secret scan).
#
# Security posture (see .github/README.md):
#   * top-level `permissions: {}` — every job opts back in to the *minimum*.
#   * every third-party action is pinned to a full commit SHA with a trailing
#     `# vX.Y.Z` comment (re-pin with Dependabot / `pin-github-action`).
#   * PR runs are cancel-in-progress; main runs are not cancelled.
name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege by default. Jobs elevate only what they need.
permissions: {}

# One in-flight CI run per ref. Superseded PR pushes are cancelled to save
# runner minutes; pushes to main run to completion (no cancel) for an audit
# trail of every commit that landed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  api:
    name: API (ruff / mypy / pytest)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up uv (with cache)
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          version: "0.7.13"
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Install Python 3.12 + sync (frozen)
        run: uv sync --frozen --all-groups

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy, strict)
        run: uv run mypy src

      # Docker is available on GitHub-hosted runners, so testcontainers can spin
      # up throwaway Postgres/Redis. pytest-cov is injected ephemerally via
      # `uv run --with` so it need not live in the project's dependency groups.
      #
      # Coverage gate: `--cov-fail-under=85` is a conservative floor that fails
      # the build if line coverage drops below 85%. Raise this toward the
      # project's coverage target as the suite matures (ratchet it up; never
      # lower it without sign-off).
      - name: Test (pytest + coverage gate)
        run: >-
          uv run --with pytest-cov pytest
          --cov=atlas_api
          --cov-report=xml:coverage.xml
          --cov-report=term-missing
          --cov-fail-under=85
          --junitxml=pytest-junit.xml

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: api-coverage
          path: |
            apps/api/coverage.xml
            apps/api/pytest-junit.xml
          if-no-files-found: error
          retention-days: 14

      # Optional: publish to Codecov. Requires CODECOV_TOKEN repo secret.
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@0565863a31f2c772f9f0395002a31e3f06189574 # v5.4.0
      #   with:
      #     files: apps/api/coverage.xml
      #     flags: api
      #   env:
      #     CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  web:
    name: Web (tsc --noEmit)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node 20 (with npm cache)
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/cloudflare/package-lock.json

      - name: Install (npm ci)
        run: npm ci

      - name: Type check (tsc --noEmit)
        run: npx tsc --noEmit

  web-app:
    name: Web app (typecheck / build / vitest)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node 20 (with npm cache)
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install (npm ci)
        run: npm ci

      - name: Type check (tsc --noEmit)
        run: npm run typecheck

      - name: Build (vite)
        run: npm run build

      - name: Test (vitest)
        run: npm test -- --run

  security:
    name: Security (Trivy fs + config, secrets)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      # Required to publish SARIF to the GitHub code-scanning dashboard.
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ---- Gate 1: dependency / filesystem vulnerabilities -----------------
      # Fails the build on any fixable CRITICAL/HIGH finding in lockfiles
      # (uv.lock, package-lock.json) or other detected manifests.
      - name: Trivy filesystem scan (gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table

      # ---- Gate 2: IaC / config misconfiguration --------------------------
      # Scans app Dockerfiles, Helm, and Kubernetes manifests. Terraform is
      # gated separately and more thoroughly in terraform.yml (Trivy IaC +
      # Checkov, with module context), so it is skipped here to avoid redundant
      # double-gating and eval-limited findings on the env modules.
      - name: Trivy config (IaC) scan (gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table
          skip-dirs: infra/terraform

      # ---- Visibility: upload SARIF (non-blocking) ------------------------
      - name: Trivy filesystem scan (SARIF)
        if: ${{ !cancelled() }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-results.sarif
          # Report-only here; gating is done by the steps above.
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@b6a472f63d85b9c78a3ac5e89422239fc15e9b3c # v3.28.1
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

      # ---- Secret scan (history-aware on PRs) -----------------------------
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3 # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Semgrep SAST. Runs the registry rulesets over the source tree and publishes
  # SARIF to the code-scanning dashboard (report-only — `semgrep scan` is
  # non-blocking by default, so findings surface as alerts without failing CI;
  # promote to a gate later by switching to `semgrep ci`/`--error`).
  #
  # NOTE on pinning: the former `semgrep/semgrep-action` is archived and the
  # official `semgrep/semgrep` image is Alpine/musl, which is incompatible with
  # the glibc Node that `upload-sarif` needs when used as a job container. We
  # therefore install the Semgrep CLI pinned to an exact version and keep every
  # `uses:` action pinned by full commit SHA, consistent with the repo policy.
  # (Equivalent digest-pinned image: semgrep/semgrep:1.168.0
  #  @sha256:59fbed6127ea7c5dde3ba6a85142733bb20ea9aaa36120c953904f1539aaf66e.)
  semgrep:
    name: Security (Semgrep SAST)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      # Required to publish SARIF to the GitHub code-scanning dashboard.
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install Semgrep (pinned)
        run: python -m pip install --disable-pip-version-check semgrep==1.168.0

      # Registry rulesets: p/ci (curated CI baseline), p/python, p/javascript
      # (also covers TypeScript), and p/secrets. Scoped to source by excluding
      # vendored / build output. Report-only: emits SARIF, exit code stays 0.
      - name: Semgrep scan (SARIF)
        run: >-
          semgrep scan
          --config=p/ci
          --config=p/python
          --config=p/javascript
          --config=p/secrets
          --sarif --output=semgrep.sarif
          --exclude=node_modules
          --exclude=.venv
          --exclude=dist
          --exclude=build
          --metrics=off
          --disable-version-check

      - name: Upload Semgrep SARIF
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@b6a472f63d85b9c78a3ac5e89422239fc15e9b3c # v3.28.1
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ---------------------------------------------------------------------------
  # Bandit — Python security linter over the API source. The official action
  # installs Bandit, runs it (report-only; it does not fail the build), emits
  # SARIF, and uploads it to code scanning. Scoped to apps/api/src.
  # ---------------------------------------------------------------------------
  bandit:
    name: Security (Bandit — Python)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      # Required: the action uploads its SARIF to code scanning.
      security-events: write
    steps:
      - name: Bandit scan (SARIF -> code scanning)
        uses: PyCQA/bandit-action@ca64e96d362b1764a98d841aaf3a4b1e2d690c7b # v1
        with:
          targets: apps/api/src
