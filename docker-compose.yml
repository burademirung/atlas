services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  pgbouncer:
    image: edoburu/pgbouncer:latest
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./infra/local/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infra/local/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports: ["6432:6432"]

  migrate:
    build: ./apps/api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://atlas:atlas@db:5432/atlas
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-me-32-chars-min!
    command: ["uv", "run", "alembic", "upgrade", "head"]
    restart: "no"

  api:
    build: ./apps/api
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://atlas:atlas@pgbouncer:6432/atlas
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-me-32-chars-min!
      ENVIRONMENT: dev
    ports: ["8080:8080"]

  # arq worker — runs the LangGraph research graph, streams progress to Redis,
  # persists results to Postgres. Needs ANTHROPIC_API_KEY to call Claude.
  worker:
    build: ./apps/api
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://atlas:atlas@pgbouncer:6432/atlas
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-me-32-chars-min!
      ENVIRONMENT: dev
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      RESEARCH_MODEL: ${RESEARCH_MODEL:-claude-opus-4-8}
    command: ["uv", "run", "arq", "atlas_api.worker.WorkerSettings"]

  # React SPA (nginx) — serves the UI and proxies /v1 to the API (SSE-safe).
  web:
    build: ./apps/web
    depends_on:
      api:
        condition: service_started
    ports: ["8081:8080"]
