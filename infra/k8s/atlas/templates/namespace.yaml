{{- if .Values.namespace.create }}
{{- /*
  Optionally chart-managed namespace carrying the Pod Security Admission labels
  that enforce the Pod Security Standards "restricted" profile at the namespace
  boundary (defence in depth on top of the per-pod/container securityContext).

  Standards: Kubernetes Pod Security Standards "restricted";
  CIS Kubernetes Benchmark §5.2 (Pod Security Standards);
  NIST 800-53 AC-6 (least privilege) / CM-7 (least functionality).

  Disabled by default — see the `namespace` block in values.yaml for the
  out-of-band labelling required when the namespace is not chart-managed.
*/ -}}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace.name | default .Release.Namespace }}
  labels:
    {{- include "atlas.labels" . | nindent 4 }}
    {{- with .Values.namespace.podSecurityLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
