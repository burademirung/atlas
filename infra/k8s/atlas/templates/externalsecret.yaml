{{- if .Values.externalSecrets.enabled }}
{{- /*
  Assemble DATABASE_URL inside the ESO target template: the DB password comes
  from AWS Secrets Manager (key DB_PASSWORD below); host/user/port/name are
  non-secret and baked in from values at render time. The backtick raw string
  keeps `{{ .DB_PASSWORD }}` literal so ESO (engineVersion v2), not Helm,
  resolves it. The app reads a single DATABASE_URL env var.
*/ -}}
{{- $pw := `{{ .DB_PASSWORD }}` -}}
{{- $dbUrl := printf "%s://%s:%s@%s:%v/%s" .Values.config.db.driver .Values.config.db.user $pw .Values.config.db.host .Values.config.db.port .Values.config.db.name -}}
apiVersion: {{ .Values.externalSecrets.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ include "atlas.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "atlas.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "atlas.secretName" . }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      metadata:
        labels:
          {{- include "atlas.labels" . | nindent 10 }}
      data:
        # Composite connection string (password injected from Secrets Manager).
        DATABASE_URL: {{ $dbUrl | quote }}
        JWT_SECRET: "{{ `{{ .JWT_SECRET }}` }}"
        ANTHROPIC_API_KEY: "{{ `{{ .ANTHROPIC_API_KEY }}` }}"
        TAVILY_API_KEY: "{{ `{{ .TAVILY_API_KEY }}` }}"
        {{- if .Values.externalSecrets.remoteRefs.redisPassword.key }}
        REDIS_PASSWORD: "{{ `{{ .REDIS_PASSWORD }}` }}"
        {{- end }}
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.dbPassword.key | quote }}
        {{- with .Values.externalSecrets.remoteRefs.dbPassword.property }}
        property: {{ . | quote }}
        {{- end }}
    - secretKey: JWT_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.jwtSecret.key | quote }}
        {{- with .Values.externalSecrets.remoteRefs.jwtSecret.property }}
        property: {{ . | quote }}
        {{- end }}
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.anthropicApiKey.key | quote }}
        {{- with .Values.externalSecrets.remoteRefs.anthropicApiKey.property }}
        property: {{ . | quote }}
        {{- end }}
    - secretKey: TAVILY_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.tavilyApiKey.key | quote }}
        {{- with .Values.externalSecrets.remoteRefs.tavilyApiKey.property }}
        property: {{ . | quote }}
        {{- end }}
    {{- if .Values.externalSecrets.remoteRefs.redisPassword.key }}
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.redisPassword.key | quote }}
        {{- with .Values.externalSecrets.remoteRefs.redisPassword.property }}
        property: {{ . | quote }}
        {{- end }}
    {{- end }}
{{- end }}
