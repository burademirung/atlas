{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "atlas.fullname" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "atlas.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    # Run Alembic `upgrade head` BEFORE the app rolls out. Expand-contract /
    # backward-compatible migrations keep this safe to run pre-rollout (§10).
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migration.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "atlas.labels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Values.serviceAccount.migration.name }}
      {{- include "atlas.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "atlas.image" (dict "root" $ "repo" .Values.migration.image.repository "tag" .Values.migration.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.migration.command | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "atlas.configMapName" . }}
            - secretRef:
                name: {{ include "atlas.secretName" . }}
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.emptyDirTmp.enabled }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- end }}
      {{- if .Values.emptyDirTmp.enabled }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.emptyDirTmp.sizeLimit }}
      {{- end }}
{{- end }}
