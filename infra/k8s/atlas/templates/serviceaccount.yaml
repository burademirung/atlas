{{- if .Values.serviceAccount.api.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.api.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "atlas.api.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.api.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# EKS Pod Identity: the SA->IAM-role association is created out of band
# (Terraform / aws eks create-pod-identity-association). No IRSA annotation
# is required; the annotations map above is the documented IRSA fallback.
automountServiceAccountToken: true
{{- end }}
{{- if .Values.serviceAccount.worker.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.worker.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "atlas.worker.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.worker.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
{{- end }}
{{- if .Values.serviceAccount.migration.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.migration.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "atlas.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    {{- with .Values.serviceAccount.migration.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    # Run as a Helm hook so it is created before the migration Job.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
automountServiceAccountToken: true
{{- end }}
